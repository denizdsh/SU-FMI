<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Live Coding</title>
	<link rel="stylesheet" href="./styles.css">
</head>
<body>
	<header class="header">
		<img src="https://upload.wikimedia.org/wikipedia/commons/6/69/IMDB_Logo_2016.svg" alt="logo" />
		<input type="search" value="batman" />
		<span class="separator"></span>
		<button class="sign-in">Sign in</button>
	</header>
	
	<main>
		<section class="left-column">
			<h1>Search "batman"</h1>

			<div class="main-content">
				<div class="main-content-row">
					<h2 class="heading-title">Titles</h2>
					<button>Popular matches</button>
				</div>
				<div class="main-content-row">
					<ul class="movies">
						<li class="movie-li">
							<img src="https://m.media-amazon.com/images/M/MV5BYzZmZWViM2EtNzhlMi00NzBlLWE0MWEtZDFjMjk3YjIyNTBhXkEyXkFqcGc@._V1_QL75_UX100_CR0,1,100,148_.jpg" alt="batman" />
							<div class="movie-info">
								<span class="movie-title">Batman</span>
								<span class="movie-year">1989</span>
								<span class="movie-actors">Michael Keaton, Jack Nicholson</span>
							</div>
						</li>
					</ul>
				</div>
			</div>
		</section>

		<aside class="right-column">
			<div class="heading">
				<h2 class="heading-title">More results</h2>
				<h3>Search "batman" within...</h3>
			</div>
			<div class="pills">
				<div class="pill">All</div>
				<div class="pill">People</div>
				<div class="pill">TV</div>
				<div class="pill">Movies</div>
				<div class="pill">Action</div>
				<div class="pill">Spiderman</div>
			</div>
		</aside>

	</main>

	<footer class="footer"></footer>
</body>
</html>
